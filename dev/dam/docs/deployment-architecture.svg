<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 890" font-family="Segoe UI, Inter, Arial, sans-serif">
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d97706"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker>
    <marker id="agrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <rect x="0" y="0" width="1240" height="890" fill="#ffffff"/>
  <text x="620" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">TooVix DAM — End-to-End Deployment Architecture</text>
  <text x="620" y="56" text-anchor="middle" font-size="12.5" fill="#64748b">Agents in the customer tenant · hub-and-spoke landing zone in the DAM tenant · agents are outbound-only</text>

  <!-- ══ CUSTOMER TENANT ══ -->
  <rect x="24" y="80" width="300" height="560" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="40" y="106" font-size="13" font-weight="700" fill="#1e40af">CUSTOMER TENANT</text>
  <text x="40" y="123" font-size="10.5" fill="#3b82f6">VCN / VPC — private, no inbound</text>

  <g>
    <rect x="44" y="150" width="118" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="103" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">db-vm-a</text>
    <rect x="58" y="181" width="90" height="19" rx="5" fill="#dbeafe" stroke="#3b82f6"/><text x="103" y="194" text-anchor="middle" font-size="10" fill="#1e40af">▣ agent</text>
  </g>
  <g>
    <rect x="44" y="222" width="118" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="103" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">db-vm-b</text>
    <rect x="58" y="253" width="90" height="19" rx="5" fill="#dbeafe" stroke="#3b82f6"/><text x="103" y="266" text-anchor="middle" font-size="10" fill="#1e40af">▣ agent</text>
  </g>
  <g>
    <rect x="44" y="294" width="118" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="103" y="317" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">db-paas</text>
    <rect x="52" y="325" width="102" height="19" rx="5" fill="#ede9fe" stroke="#8b5cf6"/><text x="103" y="338" text-anchor="middle" font-size="9.5" fill="#6d28d9">agentless (audit)</text>
  </g>

  <!-- Collector — OPTIONAL aggregator (dashed) -->
  <rect x="188" y="150" width="118" height="94" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="247" y="176" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">Collector</text>
  <rect x="205" y="184" width="84" height="18" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="247" y="197" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b">OPTIONAL</text>
  <text x="247" y="220" text-anchor="middle" font-size="9.5" fill="#64748b">aggregates agents</text>
  <text x="247" y="232" text-anchor="middle" font-size="9.5" fill="#64748b">→ one egress</text>

  <!-- NAT Gateway — REQUIRED cloud egress (solid) -->
  <rect x="188" y="286" width="118" height="66" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="1.8"/>
  <text x="247" y="309" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">NAT Gateway</text>
  <rect x="203" y="316" width="88" height="18" rx="9" fill="#d1fae5" stroke="#0f766e"/>
  <text x="247" y="329" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">REQUIRED</text>
  <text x="247" y="347" text-anchor="middle" font-size="9" fill="#64748b">Cloud NAT · egress</text>

  <!-- agents → collector (optional, dashed) -->
  <line x1="162" y1="176" x2="186" y2="184" stroke="#94a3b8" stroke-dasharray="4 3" marker-end="url(#agrey)"/>
  <line x1="162" y1="250" x2="186" y2="212" stroke="#94a3b8" stroke-dasharray="4 3" marker-end="url(#agrey)"/>
  <!-- collector → NAT (aggregated egress, solid) -->
  <line x1="247" y1="244" x2="247" y2="286" stroke="#94a3b8" marker-end="url(#agrey)"/>
  <!-- agentless / direct → NAT (bypass collector) -->
  <line x1="162" y1="322" x2="186" y2="320" stroke="#94a3b8" stroke-dasharray="4 3" marker-end="url(#agrey)"/>
  <text x="247" y="266" text-anchor="middle" font-size="8.5" fill="#94a3b8">or direct ↓</text>

  <text x="40" y="470" font-size="9.8" fill="#475569"><tspan font-weight="700">NAT Gateway</tspan> — required cloud egress</text>
  <text x="40" y="483" font-size="9.8" fill="#475569">(already provisioned by your Cloud NAT).</text>
  <text x="40" y="503" font-size="9.8" fill="#475569"><tspan font-weight="700">Collector</tspan> — optional aggregator; gives</text>
  <text x="40" y="516" font-size="9.8" fill="#475569">one auditable egress point at scale.</text>
  <text x="40" y="558" font-size="10.2" fill="#475569" font-weight="600">Agents dial OUTBOUND only (mTLS 443);</text>
  <text x="40" y="572" font-size="10.2" fill="#475569">nothing ever connects INTO the customer.</text>

  <!-- transit -->
  <text x="398" y="206" text-anchor="middle" font-size="10.5" fill="#475569">Internet</text>
  <text x="398" y="220" text-anchor="middle" font-size="10.5" fill="#475569">or PrivateLink</text>
  <line x1="360" y1="240" x2="360" y2="470" stroke="#cbd5e1" stroke-dasharray="4 5"/>

  <!-- ══ DAM TENANT ══ -->
  <rect x="470" y="80" width="746" height="690" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="486" y="104" font-size="14" font-weight="700" fill="#0f172a">DAM TENANT</text>
  <text x="576" y="104" font-size="10.5" fill="#64748b">· landing zone (hub + spoke)</text>

  <!-- HUB / INGRESS VCN -->
  <rect x="486" y="120" width="714" height="172" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="502" y="143" font-size="11.5" font-weight="700" fill="#b45309">HUB / INGRESS VCN  (DMZ · edge)</text>

  <rect x="502" y="158" width="94" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="549" y="187" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">Internet</text>
  <text x="549" y="202" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">Gateway</text>

  <rect x="612" y="152" width="170" height="78" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="697" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">Edge FW / WAF</text>
  <rect x="632" y="190" width="130" height="21" rx="10" fill="#fee2e2" stroke="#dc2626"/>
  <text x="697" y="205" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b91c1c">◉ PUBLIC IP · inbound</text>

  <rect x="800" y="158" width="130" height="66" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="865" y="185" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">Egress FW</text>
  <text x="865" y="200" text-anchor="middle" font-size="9" fill="#64748b">(FQDN allow-list)</text>

  <rect x="946" y="158" width="108" height="66" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1000" y="185" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0f172a">NAT GW</text>
  <text x="1000" y="200" text-anchor="middle" font-size="9" fill="#b91c1c">public · outbound</text>

  <rect x="1072" y="156" width="112" height="70" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <text x="1128" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">SMTP · Slack</text>
  <text x="1128" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">· Teams</text>

  <!-- PEERING -->
  <rect x="486" y="302" width="714" height="24" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="843" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">▲▼  VCN PEERING (LPG / DRG) — routes scoped to Internal LB / API GW only (no path to data tier)</text>

  <!-- SPOKE / DAM APP VCN -->
  <rect x="486" y="336" width="714" height="422" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="502" y="359" font-size="11.5" font-weight="700" fill="#4338ca">SPOKE / DAM APP VCN  (private — no internet route)</text>

  <rect x="506" y="374" width="152" height="62" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="582" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Internal LB</text>
  <text x="582" y="416" text-anchor="middle" font-size="9.5" fill="#64748b">private · TLS · HA</text>

  <rect x="506" y="456" width="152" height="62" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="582" y="482" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">API Gateway</text>
  <text x="582" y="498" text-anchor="middle" font-size="9.5" fill="#64748b">authZ · quota · route</text>

  <rect x="700" y="374" width="212" height="62" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="806" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Control plane</text>
  <text x="806" y="416" text-anchor="middle" font-size="9.5" fill="#64748b">dam-api services</text>

  <rect x="700" y="456" width="212" height="62" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="806" y="482" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Data plane</text>
  <text x="806" y="498" text-anchor="middle" font-size="9.5" fill="#047857">Postgres · ClickHouse</text>

  <rect x="700" y="538" width="212" height="58" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="806" y="562" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Streaming</text>
  <text x="806" y="578" text-anchor="middle" font-size="9.5" fill="#047857">Kafka / NATS</text>

  <rect x="954" y="374" width="226" height="62" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1067" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Console / UI</text>
  <text x="1067" y="416" text-anchor="middle" font-size="9.5" fill="#64748b">private (admin/tenant)</text>

  <!-- internal grey arrows -->
  <line x1="582" y1="436" x2="582" y2="456" stroke="#94a3b8" marker-end="url(#agrey)"/>
  <line x1="658" y1="484" x2="700" y2="416" stroke="#94a3b8" marker-end="url(#agrey)"/>
  <line x1="806" y1="436" x2="806" y2="456" stroke="#94a3b8" marker-end="url(#agrey)"/>
  <line x1="806" y1="518" x2="806" y2="538" stroke="#94a3b8" marker-end="url(#agrey)"/>
  <line x1="912" y1="402" x2="954" y2="402" stroke="#94a3b8" marker-end="url(#agrey)"/>

  <!-- ① INBOUND (green) — leaves via the customer NAT Gateway -->
  <path d="M306,319 C 440,300 520,220 610,192" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#ag)"/>
  <text x="430" y="176" text-anchor="middle" font-size="10.5" font-weight="700" fill="#16a34a">① inbound · mTLS 443</text>
  <path d="M697,230 C 660,300 610,330 585,372" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#ag)"/>

  <!-- ② EGRESS (amber) -->
  <path d="M830,374 C 850,300 858,260 864,226" fill="none" stroke="#d97706" stroke-width="2.4" marker-end="url(#am)"/>
  <text x="905" y="300" text-anchor="middle" font-size="10.5" font-weight="700" fill="#d97706">② egress</text>
  <line x1="930" y1="191" x2="946" y2="191" stroke="#d97706" stroke-width="2.4" marker-end="url(#am)"/>
  <line x1="1054" y1="189" x2="1072" y2="189" stroke="#d97706" stroke-width="2.4" marker-end="url(#am)"/>

  <!-- ═══ LEGEND ═══ -->
  <line x1="30" y1="800" x2="66" y2="800" stroke="#16a34a" stroke-width="3" marker-end="url(#ag)"/>
  <text x="74" y="804" font-size="11" fill="#334155"><tspan font-weight="700">① Inbound</tspan> — agent → Edge FW/WAF (only public IP) → Internal LB → API GW → control plane. Agent-initiated, mTLS.</text>

  <line x1="30" y1="824" x2="66" y2="824" stroke="#d97706" stroke-width="3" marker-end="url(#am)"/>
  <text x="74" y="828" font-size="11" fill="#334155"><tspan font-weight="700">② Egress</tspan> — control plane → Egress FW (allow-list) → NAT GW → SMTP / Slack / Teams. Outbound-only.</text>

  <line x1="30" y1="848" x2="66" y2="848" stroke="#2563eb" stroke-width="3" stroke-dasharray="5 3" marker-end="url(#ab)"/>
  <text x="74" y="852" font-size="11" fill="#334155"><tspan font-weight="700">③ Enforcement</tspan> is PULLED by agents (quarantine / masking) over the same outbound channel — the control plane never dials into the customer.</text>

  <rect x="726" y="792" width="14" height="14" rx="3" fill="#fee2e2" stroke="#dc2626"/>
  <text x="748" y="804" font-size="11" fill="#334155"><tspan font-weight="700">Only public IPs:</tspan> Edge FW/WAF (inbound) &amp; NAT GW (outbound). Everything else is private.</text>
</svg>
