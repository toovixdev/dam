<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 392" font-family="Segoe UI, Inter, Arial, sans-serif">
  <defs>
    <marker id="mkInk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/></marker>
    <marker id="mkNet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/></marker>
    <marker id="mkHost" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#0891b2"/></marker>
    <marker id="mkProxy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="mkGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="392" fill="#ffffff"/>

  <!-- DAM control plane -->
  <rect x="30" y="8" width="840" height="32" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="450" y="28" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">🛡  TooVix DAM — Control Plane   ·   events in → alerts out</text>

  <!-- telemetry (dashed, outbound) -->
  <line x1="530" y1="146" x2="530" y2="42" stroke="#6366f1" stroke-dasharray="4 3" marker-end="url(#mkNet)"/>
  <line x1="302" y1="166" x2="302" y2="42" stroke="#f59e0b" stroke-dasharray="4 3" marker-end="url(#mkProxy)"/>
  <line x1="575" y1="204" x2="575" y2="42" stroke="#0891b2" stroke-dasharray="4 3" marker-end="url(#mkHost)"/>
  <line x1="806" y1="168" x2="806" y2="42" stroke="#16a34a" stroke-dasharray="4 3" marker-end="url(#mkGreen)"/>

  <!-- data path -->
  <rect x="30" y="170" width="96" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="78" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">App /</text>
  <text x="78" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Clients</text>
  <line x1="126" y1="190" x2="248" y2="190" stroke="#0f172a" marker-end="url(#mkInk)"/>

  <rect x="250" y="166" width="104" height="48" rx="8" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="302" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">③ Inline proxy</text>
  <text x="302" y="202" text-anchor="middle" font-size="9.5" font-weight="600" fill="#f59e0b">GATE · blocks</text>
  <line x1="354" y1="190" x2="594" y2="190" stroke="#0f172a" marker-end="url(#mkInk)"/>

  <!-- DB host: both agents ON the host -->
  <rect x="438" y="118" width="300" height="124" rx="10" fill="none" stroke="#0891b2" stroke-dasharray="5 4"/>
  <text x="446" y="135" font-size="9.5" font-weight="600" fill="#64748b">DB host (e.g. db-vm-a)</text>
  <rect x="452" y="146" width="106" height="30" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1.5"/>
  <text x="505" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#6366f1">① Network agent</text>
  <text x="505" y="171" text-anchor="middle" font-size="8.5" fill="#64748b">NIC / pcap layer</text>
  <rect x="452" y="204" width="106" height="30" rx="6" fill="#f8fafc" stroke="#0891b2" stroke-width="1.5"/>
  <text x="505" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#0891b2">② Host eBPF</text>
  <text x="505" y="229" text-anchor="middle" font-size="8.5" fill="#64748b">kernel syscalls</text>
  <rect x="594" y="168" width="126" height="46" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="657" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">DB</text>
  <line x1="505" y1="176" x2="505" y2="190" stroke="#6366f1" stroke-dasharray="3 3"/>
  <line x1="505" y1="204" x2="505" y2="190" stroke="#0891b2" stroke-dasharray="3 3"/>

  <!-- agentless -->
  <line x1="720" y1="191" x2="740" y2="191" stroke="#16a34a" marker-end="url(#mkGreen)"/>
  <text x="730" y="184" text-anchor="middle" font-size="8.5" fill="#64748b">audit</text>
  <rect x="742" y="168" width="128" height="46" rx="6" fill="#f8fafc" stroke="#16a34a" stroke-width="1.5"/>
  <text x="806" y="187" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">④ Agentless</text>
  <text x="806" y="202" text-anchor="middle" font-size="9.5" fill="#16a34a">Pull / Cloud Push</text>

  <!-- legend -->
  <line x1="30" y1="272" x2="60" y2="272" stroke="#6366f1" stroke-width="3"/>
  <text x="68" y="276" font-size="11" fill="#334155"><tspan font-weight="700">① Network</tspan> — on-host NIC sniff (pcap), or off-host SPAN / traffic mirror · observe</text>
  <line x1="30" y1="296" x2="60" y2="296" stroke="#0891b2" stroke-width="3"/>
  <text x="68" y="300" font-size="11" fill="#334155"><tspan font-weight="700">② Host eBPF</tspan> — on the DB host, kernel layer · observe (sees local / IPC too)</text>
  <line x1="30" y1="320" x2="60" y2="320" stroke="#f59e0b" stroke-width="3"/>
  <text x="68" y="324" font-size="11" fill="#334155"><tspan font-weight="700">③ Inline proxy</tspan> — in the traffic path · observe + BLOCK (only mode that can block)</text>
  <line x1="30" y1="344" x2="60" y2="344" stroke="#16a34a" stroke-width="3"/>
  <text x="68" y="348" font-size="11" fill="#334155"><tspan font-weight="700">④ Agentless</tspan> — native audit logs, off-host · observe (managed / PaaS)</text>

  <text x="30" y="378" font-size="10.5" fill="#64748b">Network &amp; host agents both run ON the DB host (different capture layers, not location). Dashed = each agent's outbound telemetry to the DAM — the control plane never connects into the DB network.</text>
</svg>
