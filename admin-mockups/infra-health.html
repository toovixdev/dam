<!DOCTYPE html>
<html lang="en"><head><!--data-theme-boot--><script>(function(){try{var t=localStorage.getItem("nx-theme")||"dark";if(t==="system")t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--green-soft);color:var(--green)">&#9655;</span> Kafka</div><div class="kv" style="color:var(--green)">Healthy</div><div class="kd up">12 partitions &middot; 0 lag</div></div>

  <div id="infraContent"></div>

<script src="assets/ui.js"></script>

<script>
(function init(){
  if(!document.querySelector(".app")){ setTimeout(init, 50); return; }
  setTimeout(doInfra, 100);
})();
function doInfra(){

  var regionCards = "";

    "<div class=\"grid\" style=\"grid-template-columns:1fr 1fr 1fr;margin-bottom:14px\">" +

      "<div class=\"card\"><div class=\"hd\"><span class=\"t\">Storage Growth Trend</span><span class=\"s\">30-day ClickHouse disk %</span></div><div class=\"bd\"><div id=\"chStorageTrend\"></div></div></div>" +

            "<tr><td><b>Alert Dispatcher</b><br><small class=\"muted\">Rule engine + notification</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.0</td><td class=\"num\">4</td><td class=\"num\">28%</td><td class=\"num\">1.6 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +

            "<tr><td><b>VA Scanner</b><br><small class=\"muted\">Vulnerability assessment</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.1</td><td class=\"num\">3</td><td class=\"num\">54%</td><td class=\"num\">4.2 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>Hash-Chain Verifier</b><br><small class=\"muted\">Tamper-proof audit chain</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.1</td><td class=\"num\">2</td><td class=\"num\">18%</td><td class=\"num\">0.9 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>Event Hub Consumer</b><br><small class=\"muted\">Ingestion stream consumer</small></td><td class=\"mono\" style=\"font-size:12px\">v3.6.0</td><td class=\"num\">3</td><td class=\"num\">61%</td><td class=\"num\">5.4 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge amber dot\" style=\"font-size:10px\">Lag</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>Agent Gateway</b><br><small class=\"muted\">mTLS termination + routing</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.1</td><td class=\"num\">6</td><td class=\"num\">31%</td><td class=\"num\">1.8 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>SCIM Sync</b><br><small class=\"muted\">Identity provisioning bridge</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.0</td><td class=\"num\">2</td><td class=\"num\">12%</td><td class=\"num\">0.6 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>Checkpoint Scheduler</b><br><small class=\"muted\">Periodic chain anchor</small></td><td class=\"mono\" style=\"font-size:12px\">v2.4.1</td><td class=\"num\">2</td><td class=\"num\">8%</td><td class=\"num\">0.4 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
            "<tr><td><b>Export Service</b><br><small class=\"muted\">Scheduled + on-demand exports</small></td><td class=\"mono\" style=\"font-size:12px\">v2.3.9</td><td class=\"num\">2</td><td class=\"num\">22%</td><td class=\"num\">1.1 GB</td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge amber dot\" style=\"font-size:10px\">Slow</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td><td style=\"text-align:center\"><span class=\"badge amber dot\" style=\"font-size:10px\">Slow</span></td><td style=\"text-align:center\"><span class=\"badge green dot\" style=\"font-size:10px\">&#10003;</span></td></tr>" +
          "</tbody>" +
        "</table>" +
      "</div>" +
    "</div>";
  // Render trend charts
  if(window.pf){
    pf.line("#chCpuTrend",{labels:["W1","W2","W3","W4","Now"],lines:[
      {name:"US-East",color:"var(--primary)",points:[36,38,39,41,42]},
      {name:"EU-West",color:"var(--info)",points:[34,35,36,37,38]},
      {name:"IN-Mumbai",color:"var(--danger)",points:[40,44,48,52,56]},
      {name:"UK-South",color:"var(--green)",points:[26,27,27,28,28]},
      {name:"CA-Central",color:"var(--amber)",points:[24,23,23,22,22]}
    ]},{height:180,max:80});

    pf.line("#chStorageTrend",{labels:["W1","W2","W3","W4","Now"],lines:[
      {name:"US-East",color:"var(--primary)",points:[64,66,68,70,72]},
      {name:"EU-West",color:"var(--info)",points:[58,60,62,63,65]},
      {name:"IN-Mumbai",color:"var(--danger)",points:[72,76,80,84,87]},
      {name:"UK-South",color:"var(--green)",points:[48,50,51,53,54]},
      {name:"CA-Central",color:"var(--amber)",points:[44,45,46,47,48]}
    ]},{height:180,max:100});

    pf.line("#chEventTrend",{labels:["W1","W2","W3","W4","Now"],lines:[
      {name:"US-East",color:"var(--primary)",points:[620,640,650,670,680]},
      {name:"EU-West",color:"var(--info)",points:[380,390,400,410,420]},
      {name:"IN-Mumbai",color:"var(--danger)",points:[440,470,500,520,540]},
      {name:"UK-South",color:"var(--green)",points:[190,195,200,205,210]},
      {name:"CA-Central",color:"var(--amber)",points:[170,174,176,178,180]}
    ]},{height:180});
  }

  // WebSocket push simulation
  var lastRefreshEl = document.getElementById("lastRefresh");
  var wsStatus = document.getElementById("wsStatus");
  var refreshCount = 0;

  function simulatePush(){
    refreshCount++;
    if(lastRefreshEl) lastRefreshEl.textContent = "updated just now";
    // Flash the status to show data arrived
    if(wsStatus){
      wsStatus.innerHTML = "&#9679; Push received";
      wsStatus.style.color = "var(--primary)";
      wsStatus.style.background = "var(--primary-soft)";
      setTimeout(function(){
        wsStatus.innerHTML = "&#9679; WebSocket connected";
        wsStatus.style.color = "var(--green)";
        wsStatus.style.background = "var(--green-soft)";
      }, 1500);
    }
    // Update the "updated X ago" text over time
    if(lastRefreshEl){
      var elapsed = 0;
      clearInterval(window._refreshTimer);
      window._refreshTimer = setInterval(function(){
        elapsed++;
        if(elapsed < 60) lastRefreshEl.textContent = "updated " + elapsed + "s ago";
        else lastRefreshEl.textContent = "updated " + Math.floor(elapsed/60) + "m ago";
      }, 1000);
    }
  }

  // Simulate periodic WebSocket pushes (every 45-90s with jitter)
  function schedulePush(){
    var delay = 45000 + Math.floor(Math.random() * 45000);
    setTimeout(function(){
      simulatePush();
      if(window.pf) pf.toast("Live update received via WebSocket", "ok");
      schedulePush();
    }, delay);
  }
  schedulePush();

  // Manual refresh
  var manualRefresh = document.getElementById("manualRefresh");
  if(manualRefresh) manualRefresh.onclick = function(){
    simulatePush();
    if(window.pf) pf.toast("Manual refresh -- fetching latest metrics", "ok");
  };
}
</script>
</body></html>
