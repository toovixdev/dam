    var kvDbs = document.getElementById("kvDbs");
    var kvEvents = document.getElementById("kvEvents");
    var kvIssues = document.getElementById("kvIssues");
    if(kvHealth){ kvHealth.textContent = t.health; kvHealth.style.color = t.healthColor; }
    if(kvDbs) kvDbs.textContent = t.dbs;
    if(kvEvents) kvEvents.textContent = t.events;
    if(kvIssues){ kvIssues.textContent = t.issues; kvIssues.parentElement.querySelector(".kd").textContent = t.issueDesc; }

    function hRow(label, val, valStyle){ return '<div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px"><span class="muted">' + label + '</span><b' + (valStyle ? ' style="color:' + valStyle + '"' : '') + '>' + val + '</b></div>'; }

      return '<div class="card"><div class="hd"><span class="t">' + title + '</span><span class="s" style="color:' + badgeColor + '">&#9679; ' + badge + '</span></div><div class="bd">' + rows + '</div></div>';

    if(!c) return;
