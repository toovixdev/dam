<!DOCTYPE html>
<html lang="en"><head><!--data-theme-boot--><script>(function(){try{var t=localStorage.getItem("nx-theme")||"dark";if(t==="system")t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TooVix Admin — Tenants</title>
<link rel="stylesheet" href="assets/app.css">
<style>
.det-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:200;display:none}
.det-overlay.open{display:block}
.det-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(760px,calc(100vw - 32px));max-height:88vh;overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.22);z-index:201;display:none}
.det-modal.open{display:block}
.det-modal .dmh{display:flex;align-items:center;gap:12px;padding:18px 24px;border-bottom:1px solid var(--line);font-size:16px;font-weight:700}
.det-modal .dmh .xbtn{margin-left:auto;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.det-modal .dmb{padding:24px}
.tm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tm-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line-2)}
.tm-item:last-child{border:0}
.tm-item .k{color:var(--muted)}
.tm-item .v{font-weight:600;text-align:right}
.tm-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--subtle);margin:18px 0 10px}
.tm-section:first-child{margin-top:0}
.tm-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.tm-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.tm-link{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;font-size:12.5px;font-weight:500;color:var(--ink);text-decoration:none;cursor:pointer}
.tm-link:hover{border-color:var(--primary-ring);background:var(--primary-soft)}
.tm-link .tli{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}

/* Create tenant wizard */
.wiz-steps{display:flex;align-items:center;gap:0;margin-bottom:22px;padding:0 4px}
.wiz-step{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--subtle)}
.wiz-step.active{color:var(--primary)}
.wiz-step.done{color:var(--green)}
.wiz-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--line);background:var(--surface);color:var(--subtle)}
.wiz-step.active .wiz-num{border-color:var(--primary);background:var(--primary);color:#fff}
.wiz-step.done .wiz-num{border-color:var(--green);background:var(--green);color:#fff}
.wiz-line{flex:1;height:1.5px;background:var(--line);margin:0 10px;min-width:24px}
.wiz-line.done{background:var(--green)}
.dep-steps{display:flex;flex-direction:column;gap:2px;margin:16px 0}
.dep-step{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line)}
.dep-step.active{border-color:var(--primary);background:var(--primary-soft)}
.dep-step.done{border-color:var(--green);background:var(--green-soft)}
.dep-step.fail{border-color:var(--danger);background:var(--danger-soft)}
.dep-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none;background:var(--surface);border:1.5px solid var(--line);color:var(--muted)}
.dep-step.active .dep-dot{border-color:var(--primary);background:var(--primary);color:#fff;animation:spin 1s linear infinite}
.dep-step.done .dep-dot{border-color:var(--green);background:var(--green);color:#fff}
.dep-step.fail .dep-dot{border-color:var(--danger);background:var(--danger);color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
.dep-info{flex:1;min-width:0}.dep-info b{font-size:13.5px;display:block}.dep-info small{font-size:12px;color:var(--muted)}
.dep-step.done .dep-info small{color:var(--green)}
.dep-step.fail .dep-info small{color:var(--danger)}
.dep-time{font-size:11px;color:var(--subtle);font-variant-numeric:tabular-nums}
.dep-result{text-align:center;padding:20px 0}
.dep-result-icon{width:56px;height:56px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.dep-result h3{margin:0 0 4px;font-size:18px}
.dep-result p{color:var(--muted);font-size:13.5px;margin:0 0 18px;max-width:460px;display:inline-block}
.dep-cmd{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;white-space:pre-wrap;word-break:break-all;line-height:1.5;margin:12px 0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.deploy-card{border:1.5px solid var(--line);border-radius:11px;padding:14px;cursor:pointer;background:var(--surface);text-align:center;transition:all .15s}
.deploy-card:hover{border-color:var(--primary-ring);background:var(--surface-2)}
.deploy-card.on{border-color:var(--primary);background:var(--primary-soft)}
</style>
</head>
<body data-active="tenants">

  <div class="phead">
    <div>
      <h1>Tenants</h1>
      <div class="meta"><span>42 active &middot; 5 regions &middot; 3 plans</span></div>
    </div>
    <div class="acts">
      <button class="btn primary" id="createBtn">+ Create tenant</button>
    </div>
  </div>

  <div class="grid c4" style="margin-bottom:14px">
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--green-soft);color:var(--green)">&#9679;</span> Active</div><div class="kv">42</div><div class="kd up">&#9650; 3 this month</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--amber-soft);color:var(--amber)">&#9201;</span> Trial</div><div class="kv">5</div><div class="kd down">2 expiring this week</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--danger-soft);color:var(--danger)">&#9888;</span> Suspended</div><div class="kv">1</div><div class="kd">billing dispute</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--info-soft);color:var(--info)">&#9637;</span> Total DBs</div><div class="kv">1,847</div><div class="kd">across all tenants</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="hd"><span class="t">All Tenants</span><input class="input" id="q" placeholder="Filter tenants..." style="max-width:200px;margin-left:auto"></div>
    <div class="bd" style="padding:0;overflow-x:auto">
      <table class="tbl" id="tenantsTbl">
        <thead><tr><th>Tenant</th><th>Plan</th><th>Region</th><th class="num">Databases</th><th class="num">Events/day</th><th class="num">Agents</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>

  <div class="det-overlay" id="tmOv"></div>
  <div class="det-modal" id="tmMod">
    <div class="dmh"><b id="tmTitle">Tenant</b><button class="xbtn" id="tmX">&times;</button></div>
    <div class="dmb" id="tmBody"></div>
  </div>

  <!-- Create tenant wizard modal -->
  <div class="det-overlay" id="ctOv"></div>
  <div class="det-modal" id="ctMod" style="width:min(860px,calc(100vw - 32px))">
    <div class="dmh"><b id="ctTitle">Create Tenant</b><button class="xbtn" id="ctX">&times;</button></div>
    <div class="dmb" id="ctBody"></div>
  </div>

  <!-- Confirmation dialog -->
  <div class="det-overlay" id="cfOv" style="z-index:300"></div>
  <div class="det-modal" id="cfMod" style="z-index:301;width:min(520px,calc(100vw - 32px))">
    <div class="dmh"><b id="cfTitle">Confirm</b></div>
    <div class="dmb">
      <div id="cfBody" style="font-size:13.5px;line-height:1.6;margin-bottom:20px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn" id="confirmNo">Cancel</button>
        <button class="btn" id="confirmYes">Confirm</button>
      </div>
    </div>
  </div>

<script src="assets/ui.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(function init(){
  if(!document.querySelector(".app")){ setTimeout(init, 50); return; }
  setTimeout(doTenants, 100);
})();

function doTenants(){
  var T = [
    {n:"Meridian Financial", slug:"meridian-fin", desc:"US Fortune 500", plan:"Enterprise", planCls:"ind", region:"US-East", dbs:186, events:"142.6M", agents:341, st:"active", stBadge:"green", stLabel:"Active",
     admin:"Sarah Chen", email:"s.chen@meridianfg.com", sso:"Azure AD", kms:"HashiCorp Vault", retention:"90d hot / 7yr cold", compliance:"PCI-DSS, GDPR, SOX, HIPAA, DPDPA, RBI", created:"12 Jan 2026", contract:"14 Oct 2026", health:92},
    {n:"Bharat National Bank", slug:"bnb-india", desc:"PSU Bank", plan:"Enterprise", planCls:"ind", region:"IN-Mumbai", dbs:240, events:"198.4M", agents:482, st:"active", stBadge:"green", stLabel:"Active",
     admin:"Rajesh Kumar", email:"r.kumar@bnb.co.in", sso:"Azure AD", kms:"AWS KMS", retention:"90d hot / 7yr cold", compliance:"DPDPA, RBI, PCI-DSS, CERT-In", created:"05 Feb 2026", contract:"22 Dec 2026", health:89},
    {n:"Nordic Insurance Group", slug:"nordic-ins", desc:"Nordics", plan:"Business", planCls:"", region:"EU-West", dbs:89, events:"67.2M", agents:164, st:"active", stBadge:"green", stLabel:"Active",
     admin:"Erik Lindgren", email:"e.lindgren@nordicins.eu", sso:"Okta", kms:"Platform default", retention:"90d hot / 1yr cold", compliance:"GDPR, PCI-DSS, ISO 27001", created:"18 Mar 2026", contract:"08 Aug 2026", health:76},
    {n:"Pacific Health Partners", slug:"pacific-hp", desc:"US Healthcare", plan:"Business", planCls:"", region:"US-West", dbs:112, events:"84.1M", agents:218, st:"active", stBadge:"green", stLabel:"Active",
     admin:"Dr. Lisa Park", email:"l.park@pacifichealth.com", sso:"Azure AD", kms:"Platform default", retention:"90d hot / 7yr cold", compliance:"HIPAA, PCI-DSS, SOX", created:"22 Jan 2026", contract:"15 Sep 2026", health:82},
    {n:"Royal Commerce UK", slug:"royal-comm", desc:"UK Retail", plan:"Business", planCls:"", region:"UK-South", dbs:64, events:"41.8M", agents:128, st:"active", stBadge:"green", stLabel:"Active",
     admin:"James Whitfield", email:"j.whitfield@royalcomm.co.uk", sso:"Azure AD", kms:"Platform default", retention:"90d hot / 1yr cold", compliance:"GDPR, PCI-DSS", created:"10 Apr 2026", contract:"30 Jul 2026", health:58},
    {n:"TechStart Inc", slug:"techstart", desc:"SaaS Startup", plan:"Starter", planCls:"amber", region:"US-East", dbs:3, events:"0.4M", agents:6, st:"trial", stBadge:"amber", stLabel:"Trial &middot; 4d left",
     admin:"Mike Torres", email:"mike@techstart.io", sso:"Google", kms:"Platform default", retention:"30d", compliance:"PCI-DSS", created:"10 Jun 2026", contract:"Trial ends 28 Jun", health:44},
    {n:"GovData India", slug:"govdata-in", desc:"Govt of India", plan:"Enterprise", planCls:"ind", region:"IN-Mumbai", dbs:156, events:"124.8M", agents:312, st:"active", stBadge:"blue", stLabel:"Active &middot; Air-gapped",
     admin:"Priya Sharma", email:"p.sharma@govdata.gov.in", sso:"LDAP/Kerberos", kms:"HashiCorp Vault (on-prem)", retention:"90d hot / 10yr cold", compliance:"DPDPA, RBI, CERT-In, ISO 27001", created:"01 Mar 2026", contract:"01 Mar 2027", health:85}
  ];

  function renderTable(){
    var q = (document.getElementById("q") || {}).value || "";
    q = q.toLowerCase();
    var tbody = document.getElementById("tBody");
    if(!tbody) return;
    var html = "";
    for(var i = 0; i < T.length; i++){
      var t = T[i];
      if(q && (t.n + t.slug + t.region).toLowerCase().indexOf(q) === -1) continue;
      html += '<tr data-idx="' + i + '" style="cursor:pointer">' +
        "<td><b>" + t.n + "</b><br><small class='muted'>" + t.slug + " &middot; " + t.desc + "</small></td>" +
        '<td><span class="badge ' + t.planCls + '">' + t.plan + "</span></td>" +
        "<td>" + t.region + "</td>" +
        '<td class="num">' + t.dbs + "</td>" +
        '<td class="num">' + t.events + "</td>" +
        '<td class="num">' + t.agents + "</td>" +
        '<td><span class="badge ' + t.stBadge + ' dot">' + t.stLabel + "</span></td>" +
        '<td><button class="btn manageBtn" style="padding:5px 12px" data-idx="' + i + '">Manage</button></td>' +
        "</tr>";
    }
    tbody.innerHTML = html;
  }

  var qInput = document.getElementById("q");
  if(qInput) qInput.addEventListener("input", renderTable);
  renderTable();

  // Create tenant button
  var createBtn = document.getElementById("createBtn");
  if(createBtn) createBtn.onclick = function(){ openCreateTenant(); };

  // ========== CREATE TENANT WIZARD ==========
  var ct = {};

  function openCtModal(){
    var ov = document.getElementById("ctOv");
    var mod = document.getElementById("ctMod");
    if(ov){ document.body.appendChild(ov); ov.classList.add("open"); }
    if(mod){ document.body.appendChild(mod); mod.classList.add("open"); }
  }
  function closeCtModal(){
    var ov = document.getElementById("ctOv");
    var mod = document.getElementById("ctMod");
    if(ov) ov.classList.remove("open");
    if(mod) mod.classList.remove("open");
  }

  function wizStepperHtml(active, labels){
    var h = '<div class="wiz-steps">';
    for(var i = 0; i < labels.length; i++){
      var cls = (i+1) < active ? "done" : (i+1) === active ? "active" : "";
      h += '<div class="wiz-step ' + cls + '"><span class="wiz-num">' + ((i+1) < active ? "&#10003;" : (i+1)) + '</span> ' + labels[i] + '</div>';
      if(i < labels.length - 1) h += '<div class="wiz-line' + ((i+1) < active ? " done" : "") + '"></div>';
    }
    return h + '</div>';
  }

  function openCreateTenant(){
    ct = {name:"", slug:"", plan:"enterprise", region:"us-east", deploy:"saas", admin:"", email:"", sso:"azure-ad", retention:"90d", compliance:""};
    showCtStep1();
    openCtModal();
  }

  // ---- STEP 1: Tenant Details ----
  function showCtStep1(){
    var title = document.getElementById("ctTitle");
    var body = document.getElementById("ctBody");
    if(!title || !body) return;
    title.textContent = "Create Tenant";

    body.innerHTML = wizStepperHtml(1, ["Tenant Details","Deployment","Provisioning"]) +

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">' +
        '<div>' +
          '<div class="tm-section" style="margin-top:0">Organization</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Organization name <span style="color:var(--danger)">*</span></label><input class="input" id="ctName" placeholder="e.g. Meridian Financial" style="width:100%" value="' + ct.name + '"></div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Tenant slug <span style="color:var(--danger)">*</span></label><input class="input" id="ctSlug" placeholder="e.g. meridian-fin" style="width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px" value="' + ct.slug + '"></div>' +

          '<div class="tm-section">Plan</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Plan</label>' +
            '<select class="input" id="ctPlan" style="width:100%"><option value="enterprise"' + (ct.plan==="enterprise"?" selected":"") + '>Enterprise</option><option value="business"' + (ct.plan==="business"?" selected":"") + '>Business</option><option value="starter"' + (ct.plan==="starter"?" selected":"") + '>Starter</option><option value="trial"' + (ct.plan==="trial"?" selected":"") + '>Trial (14 days)</option></select>' +
          '</div>' +
        '</div>' +

        '<div>' +
          '<div class="tm-section" style="margin-top:0">Tenant Admin</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Admin name <span style="color:var(--danger)">*</span></label><input class="input" id="ctAdmin" placeholder="e.g. Sarah Chen" style="width:100%" value="' + ct.admin + '"></div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Admin email <span style="color:var(--danger)">*</span></label><input class="input" id="ctEmail" placeholder="e.g. s.chen@meridianfg.com" style="width:100%" value="' + ct.email + '"></div>' +

          '<div class="tm-section">Security & Compliance</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">SSO provider</label>' +
            '<select class="input" id="ctSSO" style="width:100%"><option value="azure-ad">Azure AD / Entra ID</option><option value="okta">Okta</option><option value="google">Google Workspace</option><option value="ldap">LDAP / Kerberos</option><option value="saml">Generic SAML 2.0</option><option value="none">None (email + password)</option></select>' +
          '</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Retention policy</label>' +
            '<select class="input" id="ctRetention" style="width:100%"><option value="30d">30 days hot</option><option value="90d">90 days hot / 1 year cold</option><option value="90d-7y">90 days hot / 7 years cold</option><option value="90d-10y">90 days hot / 10 years cold</option></select>' +
          '</div>' +
          '<div class="fld"><label style="font-size:11.5px;font-weight:600;display:block;margin-bottom:4px">Compliance frameworks</label><input class="input" id="ctCompliance" placeholder="e.g. PCI-DSS, GDPR, HIPAA, DPDPA" style="width:100%" value="' + ct.compliance + '"></div>' +
        '</div>' +
      '</div>' +

      '<div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line);justify-content:flex-end">' +
        '<button class="btn" id="ct1Cancel">Cancel</button>' +
        '<button class="btn primary" id="ct1Next">Next &#8594;</button>' +
      '</div>';

    // Auto-generate slug from name
    var nameInput = body.querySelector("#ctName");
    var slugInput = body.querySelector("#ctSlug");
    if(nameInput && slugInput){
      nameInput.oninput = function(){
        if(!ct.slugEdited) slugInput.value = nameInput.value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").substr(0, 30);
      };
      slugInput.oninput = function(){ ct.slugEdited = true; };
    }

    var cancelBtn = body.querySelector("#ct1Cancel");
    if(cancelBtn) cancelBtn.onclick = function(){ closeCtModal(); };
    var nextBtn = body.querySelector("#ct1Next");
    if(nextBtn) nextBtn.onclick = function(){
      ct.name = (body.querySelector("#ctName") || {}).value || "";
      ct.slug = (body.querySelector("#ctSlug") || {}).value || "";
      ct.plan = (body.querySelector("#ctPlan") || {}).value || "enterprise";
      ct.admin = (body.querySelector("#ctAdmin") || {}).value || "";
      ct.email = (body.querySelector("#ctEmail") || {}).value || "";
      ct.sso = (body.querySelector("#ctSSO") || {}).value || "azure-ad";
      ct.retention = (body.querySelector("#ctRetention") || {}).value || "90d";
      ct.compliance = (body.querySelector("#ctCompliance") || {}).value || "";
      if(!ct.name || !ct.slug || !ct.email){ if(window.pf) pf.toast("Please fill in all required fields", "err"); return; }
      showCtStep2();
    };
  }

  // ---- STEP 2: Deployment Type ----
  function showCtStep2(){
    var title = document.getElementById("ctTitle");
    var body = document.getElementById("ctBody");
    if(!title || !body) return;
    title.textContent = "Deployment -- " + ct.name;

    if(!ct.deploy) ct.deploy = "saas";

    body.innerHTML = wizStepperHtml(2, ["Tenant Details","Deployment","Provisioning"]) +

      '<p style="font-size:13.5px;color:var(--muted);margin:0 0 18px;line-height:1.5">Choose how this tenant will be deployed. This determines how infrastructure is provisioned and what onboarding steps the customer needs to complete.</p>' +

      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px">' +
        '<div class="deploy-card' + (ct.deploy==="saas" ? " on" : "") + '" data-deploy="saas">' +
          '<div style="font-size:24px;margin-bottom:8px">&#9729;</div>' +
          '<div style="font-size:14px;font-weight:700;margin-bottom:4px">SaaS (Multi-tenant)</div>' +
          '<div style="font-size:11.5px;color:var(--muted);line-height:1.4">Fully managed on TooVix cloud. Shared infrastructure with tenant isolation via RLS + encryption. Fastest to provision.</div>' +
        '</div>' +
        '<div class="deploy-card' + (ct.deploy==="cloud" ? " on" : "") + '" data-deploy="cloud">' +
          '<div style="font-size:24px;margin-bottom:8px">&#9881;</div>' +
          '<div style="font-size:14px;font-weight:700;margin-bottom:4px">Customer Cloud (Dedicated)</div>' +
          '<div style="font-size:11.5px;color:var(--muted);line-height:1.4">Data plane runs in the customer\'s AWS / Azure / GCP / OCI account. Control plane on TooVix. Customer provides cloud credentials.</div>' +
        '</div>' +
        '<div class="deploy-card' + (ct.deploy==="onprem" ? " on" : "") + '" data-deploy="onprem">' +
          '<div style="font-size:24px;margin-bottom:8px">&#9670;</div>' +
          '<div style="font-size:14px;font-weight:700;margin-bottom:4px">On-premises / Air-gapped</div>' +
          '<div style="font-size:11.5px;color:var(--muted);line-height:1.4">Full stack deployed in customer\'s data center. No cloud dependency. Requires customer to provision VMs or Kubernetes cluster.</div>' +
        '</div>' +
      '</div>' +

      // Contextual info based on selection
      '<div id="ctDeployInfo"></div>' +

      '<div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line);justify-content:flex-end">' +
        '<button class="btn" id="ct2Back">&#8592; Back</button>' +
        '<button class="btn primary" id="ct2Next">Provision tenant &#8594;</button>' +
      '</div>';

  // ---- STEP 3: Provisioning ----
  function showCtStep3(){
    var title = document.getElementById("ctTitle");
    var body = document.getElementById("ctBody");
    if(!title || !body) return;
    title.textContent = "Provisioning -- " + ct.name;

    var regionLabels = {"us-east":"US-East","us-west":"US-West","eu-west":"EU-West","eu-central":"EU-Central","uk-south":"UK-South","in-mumbai":"IN-Mumbai","ap-southeast":"AP-Southeast",
      "US":"United States","IN":"India","GB":"United Kingdom","DE":"Germany","SG":"Singapore","AU":"Australia","CA":"Canada","JP":"Japan","BR":"Brazil","AE":"UAE","SA":"Saudi Arabia","ZA":"South Africa"};
    var regionLabel = regionLabels[ct.region] || ct.region;
    var ssoLabels = {"azure-ad":"Azure AD","okta":"Okta","google":"Google","ldap":"LDAP/Kerberos","saml":"SAML 2.0","none":"Email/password"};

    var html = wizStepperHtml(3, ["Tenant Details","Deployment","Provisioning"]);

    // Summary bar
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px">' +
      '<span class="pill p-ind">' + ct.name + '</span>' +
      '<span class="pill" style="background:var(--surface-2);border:1px solid var(--line)">' + ct.plan + '</span>' +
      '<span class="pill" style="background:var(--surface-2);border:1px solid var(--line)">' + regionLabel + '</span>' +
      '<span class="pill" style="background:var(--surface-2);border:1px solid var(--line)">' + (ct.deploy==="saas" ? "SaaS (" + cloudLabel + ")" : ct.deploy==="cloud" ? "Customer Cloud (" + cloudLabel + ")" : "On-premises") + '</span>' +
    '</div>';

    // Cloud-native service names
    var cloud = ct.deploy === "saas" ? (ct.saasCloud || "azure") : (ct.custCloud || "aws");
    var svcNames = {
      azure: {stream:"Azure Event Hub", kms:"Azure Key Vault", blob:"Azure Blob Storage", identity:"Azure AD / Entra ID"},
      aws:   {stream:"Kinesis Data Stream", kms:"AWS KMS", blob:"S3", identity:"AWS IAM + Cognito"},
      oci:   {stream:"OCI Streaming", kms:"OCI Vault", blob:"OCI Object Storage", identity:"OCI IAM"},
      gcp:   {stream:"Pub/Sub", kms:"Cloud KMS", blob:"Cloud Storage", identity:"Google IAM"}
    };
    var svc = svcNames[cloud] || svcNames.azure;
    var cloudLabel = {azure:"Azure",aws:"AWS",oci:"OCI",gcp:"GCP"}[cloud] || cloud;

    // Build steps based on deployment type
    var steps;
    if(ct.deploy === "saas"){
      steps = [
        {id:"ct1", label:"Creating tenant record", desc:"Postgres -- " + ct.slug + " with RLS policy + tenant isolation", dur:800},
        {id:"ct2", label:"Provisioning ClickHouse schema", desc:"Event tables, materialized views, partitions, TTL (" + ct.retention + ")", dur:1400},
        {id:"ct3", label:"Creating ingestion stream", desc:svc.stream + " -- " + ct.slug + "-events namespace with tenant-scoped partitions", dur:1000},
        {id:"ct4", label:"Provisioning blob storage", desc:svc.blob + " container for cold-tier retention + compliance archive", dur:800},
        {id:"ct5", label:"Generating encryption keys", desc:svc.kms + " -- tenant master key + data encryption key (DEK) for events at rest", dur:600},
        {id:"ct6", label:"Generating API keys & mTLS certificates", desc:"Tenant API key pair + agent enrollment CA + mTLS root certificate", dur:800},
        {id:"ct7", label:"Creating tenant admin account", desc:"Inviting " + ct.admin + " (" + ct.email + ") with SSO via " + (ssoLabels[ct.sso] || ct.sso), dur:800},
        {id:"ct8", label:"Deploying default content packs", desc:"Base policies, classification rules, alert templates, compliance mappings", dur:1000},
        {id:"ct9", label:"Running health check", desc:"Validating end-to-end pipeline on " + cloudLabel + " -- ingest, parse, store, query", dur:1200},
      ];
    } else if(ct.deploy === "cloud"){
      steps = [
        {id:"ct1", label:"Creating tenant record", desc:"Postgres -- " + ct.slug + " with RLS policy + tenant isolation", dur:800},
        {id:"ct2", label:"Generating data plane artifacts", desc:"Terraform modules for " + cloudLabel + " -- ClickHouse, " + svc.stream + ", " + svc.blob + ", " + svc.kms, dur:1600},
        {id:"ct3", label:"Generating encryption keys", desc:"Control-plane " + svc.kms + " key + customer-side DEK bootstrap config", dur:600},
        {id:"ct4", label:"Generating API keys & mTLS certificates", desc:"Tenant API key pair + agent enrollment CA + mTLS root certificate", dur:800},
        {id:"ct5", label:"Creating tenant admin account", desc:"Inviting " + ct.admin + " (" + ct.email + ") with SSO via " + (ssoLabels[ct.sso] || ct.sso), dur:800},
        {id:"ct6", label:"Deploying default content packs", desc:"Base policies, classification rules, alert templates", dur:1000},
      ];
    } else {
      steps = [
        {id:"ct1", label:"Creating tenant record", desc:"Postgres -- " + ct.slug + " with RLS policy + tenant isolation", dur:800},
        {id:"ct2", label:"Generating license key", desc:"Air-gapped license for " + ct.name + " -- " + ct.plan + " tier", dur:600},
        {id:"ct3", label:"Generating encryption keys & certificates", desc:"Offline root CA + tenant mTLS certificates + API key pair", dur:800},
        {id:"ct4", label:"Building deployment bundle", desc:"Helm charts / VM installer with tenant config, certificates, Kafka, ClickHouse, content packs", dur:2000},
        {id:"ct5", label:"Creating admin credentials", desc:"Initial admin account for " + ct.admin + " (" + ct.email + ")", dur:600},
      ];
    }

    html += '<div class="dep-steps" id="ctSteps">';
    for(var i = 0; i < steps.length; i++){
      html += '<div class="dep-step" id="' + steps[i].id + '"><span class="dep-dot">' + (i+1) + '</span>' +
        '<div class="dep-info"><b>' + steps[i].label + '</b><small>' + steps[i].desc + '</small></div>' +
        '<span class="dep-time" id="' + steps[i].id + '_t"></span></div>';
    }
    html += '</div><div id="ctResult"></div>';
    body.innerHTML = html;

    // Animate
    var current = 0;
    var failAt = Math.random() < 0.1 ? 2 : -1;

    function nextStep(){
      if(current >= steps.length) return showCtSuccess();
      if(current === failAt) return showCtFailure(steps[current]);

      var el = document.getElementById(steps[current].id);
      var tEl = document.getElementById(steps[current].id + "_t");
      if(el) el.classList.add("active");
      if(tEl) tEl.textContent = "working...";
      var dur = steps[current].dur;
      var idx = current;
      setTimeout(function(){
        var el2 = document.getElementById(steps[idx].id);
        var tEl2 = document.getElementById(steps[idx].id + "_t");
        if(el2){ el2.classList.remove("active"); el2.classList.add("done"); }
        if(tEl2) tEl2.textContent = (dur/1000).toFixed(1) + "s";
        var dot = el2 && el2.querySelector(".dep-dot");
        if(dot) dot.textContent = "✓";
        current++;
        nextStep();
      }, dur);
    }
    nextStep();

    function showCtSuccess(){
      title.textContent = "Provisioned -- " + ct.name;
      var r = document.getElementById("ctResult");
      if(!r) return;

      var postSteps = "";
      if(ct.deploy === "cloud"){
        postSteps =
          '<div style="text-align:left;max-width:520px;margin:0 auto 16px">' +
            '<div class="tm-section">Customer action required</div>' +
            '<div class="dep-cmd"><span style="color:var(--subtle)"># Download and apply the Terraform deployment</span>\n' +
              'terraform init -from-module=toovix/data-plane/' + ((body.querySelector && body.querySelector("#ctCloud") || {}).value || "aws") + '\n' +
              'terraform apply -var="tenant_id=' + ct.slug + '"</div>' +
            '<p style="font-size:11.5px;color:var(--subtle);margin:4px 0 0">Send these artifacts to the customer. The data plane will come online once they apply the Terraform configuration in their cloud account.</p>' +
          '</div>';
      } else if(ct.deploy === "onprem"){
        postSteps =
          '<div style="text-align:left;max-width:520px;margin:0 auto 16px">' +
            '<div class="tm-section">Customer deployment bundle</div>' +
            '<div class="dep-cmd"><span style="color:var(--subtle)"># Kubernetes deployment</span>\n' +
              'helm install toovix-dam oci://registry.toovix.security/charts/dam-full \\\n' +
              '  --set license.key=<span style="color:var(--primary)">LIC-' + Math.random().toString(36).substr(2,8).toUpperCase() + '</span> \\\n' +
              '  --set tenant.id=<span style="color:var(--primary)">' + ct.slug + '</span> \\\n' +
              '  --namespace toovix-dam --create-namespace\n\n' +
              '<span style="color:var(--subtle)"># Or VM-based deployment</span>\n' +
              'curl -fsSL https://get.toovix.security/full-stack | \\\n' +
              '  TOOVIX_LICENSE=<span style="color:var(--primary)">LIC-' + Math.random().toString(36).substr(2,8).toUpperCase() + '</span> \\\n' +
              '  TOOVIX_TENANT=<span style="color:var(--primary)">' + ct.slug + '</span> bash</div>' +
            '<p style="font-size:11.5px;color:var(--subtle);margin:4px 0 0">Send this bundle to the customer. Includes Helm charts, VM installer, certificates, license key, and default content packs.</p>' +
          '</div>';
      }

      r.innerHTML =
        '<div class="dep-result">' +
          '<div class="dep-result-icon" style="background:var(--green-soft);color:var(--green)">&#10003;</div>' +
          '<h3>Tenant provisioned</h3>' +
          '<p><b>' + ct.name + '</b> (' + ct.slug + ') has been provisioned on <b>' + regionLabel + '</b>. ' +
            (ct.deploy === "saas" ? 'All infrastructure is live. Admin invitation sent to <b>' + ct.email + '</b>.'
             : ct.deploy === "cloud" ? 'Control plane is live. Customer needs to apply the data plane artifacts below.'
             : 'Deployment bundle is ready. Send to the customer for on-premises installation.') +
          '</p>' +
          postSteps +
          '<div style="display:flex;gap:10px;justify-content:center">' +
            '<button class="btn" id="ctDone">Close</button>' +
            (ct.deploy !== "saas" ? '<button class="btn" onclick="if(window.pf)pf.toast(\'Deployment bundle downloaded\',\'ok\')">&#8615; Download bundle</button>' : '') +
            '<button class="btn primary" onclick="if(window.pf)pf.toast(\'Opening tenant management\')">Manage tenant</button>' +
          '</div>' +
        '</div>';

      var doneBtn = document.getElementById("ctDone");
      if(doneBtn) doneBtn.onclick = function(){ closeCtModal(); renderTable(); };
      if(window.pf) pf.toast(ct.name + " provisioned on " + regionLabel, "ok");
    }

    function showCtFailure(step){
      var el = document.getElementById(step.id);
      if(el) el.classList.add("fail");
      var dot = el && el.querySelector(".dep-dot");
      if(dot) dot.textContent = "✗";
      var tEl = document.getElementById(step.id + "_t");
      if(tEl) tEl.textContent = "failed";

      title.textContent = "Provisioning failed -- " + ct.name;
      var r = document.getElementById("ctResult");
      if(!r) return;
      r.innerHTML =
        '<div class="dep-result">' +
          '<div class="dep-result-icon" style="background:var(--danger-soft);color:var(--danger)">&#10007;</div>' +
          '<h3>Provisioning failed</h3>' +
          '<p>Step <b>"' + step.label + '"</b> failed for tenant <b>' + ct.name + '</b>. Partial resources may have been created.</p>' +
        '</div>' +
        '<div style="display:flex;gap:10px;justify-content:center">' +
          '<button class="btn primary" id="ctRetry">&#8635; Retry</button>' +
          '<button class="btn" onclick="if(window.pf)pf.toast(\'Opening provisioning logs\')">&#9776; View logs</button>' +
          '<button class="btn" id="ctFailClose">Close</button>' +
        '</div>';

      var retryBtn = document.getElementById("ctRetry");
      if(retryBtn) retryBtn.onclick = function(){ failAt = -1; current = 0; body.innerHTML = ""; showCtStep3(); };
      var closeBtn = document.getElementById("ctFailClose");
      if(closeBtn) closeBtn.onclick = function(){ closeCtModal(); };
      if(window.pf) pf.toast("Provisioning failed: " + step.label, "err");
    }
  }

  // All click handling via delegation
  document.addEventListener("click", function(e){
    // Close create tenant modal
    if(e.target.id==="ctOv" || (e.target.closest && e.target.closest("#ctX"))){ closeCtModal(); return; }

    // Manage button on table row
    var manageBtn = e.target.closest && e.target.closest(".manageBtn");
    if(manageBtn){
      var idx = parseInt(manageBtn.getAttribute("data-idx"));
      openManage(T[idx]);
      return;
    }

    // Close modal
    if(e.target.id === "tmOv" || (e.target.closest && e.target.closest("#tmX"))){
      closeModal();
      return;
    }

    // Action buttons inside the manage modal
    var actBtn = e.target.closest && e.target.closest(".tm-act");
    if(actBtn){
      var act = actBtn.getAttribute("data-act");
      var tenantSlug = actBtn.getAttribute("data-tenant");
      var admin = actBtn.getAttribute("data-admin") || "";

      // Find the tenant object
      var tObj = null;
      for(var ti = 0; ti < T.length; ti++){
        if(T[ti].slug === tenantSlug){ tObj = T[ti]; break; }
      }

      if(act === "suspend"){
        showConfirm(
          "Suspend " + (tObj ? tObj.n : tenantSlug),
          "This will immediately:<br><br>" +
          "&bull; <b>Pause all capture agents</b> — no new events will be ingested<br>" +
          "&bull; <b>Set the tenant UI to read-only</b> — users can view but not modify anything<br>" +
          "&bull; <b>Block all API writes</b> — REST API returns 403 on write operations<br>" +
          "&bull; <b>Stop alert dispatch</b> — no new alerts sent to SIEM/Slack/email<br><br>" +
          "Existing audit data is <b>preserved</b> and remains queryable. The tenant admin will see a suspension banner.",
          "Confirm suspension",
          "danger",
          function(){
            if(tObj){
              tObj.st = "suspended";
              tObj.stBadge = "red";
              tObj.stLabel = "Suspended";
            }
            closeConfirm();
            closeModal();
            renderTable();
            if(window.pf) pf.toast(tenantSlug + " suspended — agents paused, UI read-only", "ok");
          }
        );
        return;
      }

      if(act === "unsuspend"){
        showConfirm(
          "Unsuspend " + (tObj ? tObj.n : tenantSlug),
          "This will:<br><br>" +
          "&bull; <b>Resume all capture agents</b> — event ingestion restarts<br>" +
          "&bull; <b>Restore full UI access</b> — users can modify policies, rules, config<br>" +
          "&bull; <b>Re-enable API writes</b><br>" +
          "&bull; <b>Resume alert dispatch</b><br><br>" +
          "Events generated during suspension were <b>not captured</b> — there will be a gap in the audit trail for the suspension period.",
          "Confirm unsuspend",
          "green",
          function(){
            if(tObj){
              tObj.st = "active";
              tObj.stBadge = "green";
              tObj.stLabel = "Active";
            }
            closeConfirm();
            closeModal();
            renderTable();
            if(window.pf) pf.toast(tenantSlug + " unsuspended — agents resuming, full access restored", "ok");
          }
        );
        return;
      }

      if(act === "offboard"){
        showConfirm(
          "Offboard " + (tObj ? tObj.n : tenantSlug),
          "This initiates a <b>30-day grace period</b>:<br><br>" +
          "&bull; Tenant admin is notified and sees a countdown banner<br>" +
          "&bull; Data export is available during the grace period<br>" +
          "&bull; After 30 days: ClickHouse DB dropped, Kafka topics deleted, KMS keys destroyed<br>" +
          "&bull; Postgres records soft-deleted, integrations disconnected, API keys revoked<br><br>" +
          "<b>This action cannot be undone after the grace period expires.</b>",
          "Initiate offboarding",
          "danger",
          function(){
            if(tObj){
              tObj.st = "offboarding";
              tObj.stBadge = "red";
              tObj.stLabel = "Offboarding &middot; 30d";
            }
            closeConfirm();
            closeModal();
            renderTable();
            if(window.pf) pf.toast("Offboarding initiated — opening offboarding workflow", "ok");
            setTimeout(function(){
              window.location.href = "tenant-offboard.html?tenant=" + encodeURIComponent(tenantSlug) + "&name=" + encodeURIComponent(tObj ? tObj.n : tenantSlug);
            }, 600);
          }
        );
        return;
      }

      // Cancel offboarding → restore to active
      if(act === "cancel-offboard"){
        showConfirm(
          "Cancel offboarding — " + (tObj ? tObj.n : tenantSlug),
          "This will cancel the offboarding process and restore the tenant to <b>active</b> status.<br><br>" +
          "&bull; Grace period timer stops<br>" +
          "&bull; Agents resume capturing (if they were paused)<br>" +
          "&bull; Tenant admin notified that offboarding is cancelled<br>" +
          "&bull; All data is preserved — nothing is destroyed",
          "Restore to active",
          "green",
          function(){
            if(tObj){
              tObj.st = "active";
              tObj.stBadge = "green";
              tObj.stLabel = "Active";
            }
            closeConfirm();
            closeModal();
            renderTable();
            if(window.pf) pf.toast(tenantSlug + " offboarding cancelled — restored to active", "ok");
          }
        );
        return;
      }

      // Export → navigate to export page with tenant slug
      if(act === "export"){
        closeModal();
        window.location.href = "tenant-export.html?tenant=" + encodeURIComponent(tenantSlug) + "&name=" + encodeURIComponent(tObj ? tObj.n : tenantSlug);
        return;
      }

      // Simple toast actions
      var msgs = {
        "reset-pw": "Reset password for " + admin + " — temp password generated, MFA re-enrollment required",
        "force-logout": tenantSlug + " — all user sessions terminated",
        "extend-trial": tenantSlug + " — trial extended 14 days",
        "migrate": "Migration wizard opened for " + tenantSlug
      };
      if(window.pf) pf.toast(msgs[act] || act, "ok");
      return;
    }

    // Confirm dialog buttons
    var confirmBtn = e.target.closest && e.target.closest("#confirmYes");
    if(confirmBtn && window._confirmCallback){
      window._confirmCallback();
      return;
    }
    var cancelBtn = e.target.closest && e.target.closest("#confirmNo");
    if(cancelBtn){
      closeConfirm();
      return;
    }
  });

  function showConfirm(title, bodyHtml, btnLabel, btnType, callback){
    var cfTitle = document.getElementById("cfTitle");
    var cfBody = document.getElementById("cfBody");
    var cfYes = document.getElementById("confirmYes");
    var cfOv = document.getElementById("cfOv");
    var cfMod = document.getElementById("cfMod");
    if(cfTitle) cfTitle.textContent = title;
    if(cfBody) cfBody.innerHTML = bodyHtml;
    if(cfYes){
      cfYes.textContent = btnLabel;
      cfYes.className = "btn " + (btnType === "danger" ? "" : "primary");
      if(btnType === "danger") cfYes.style.cssText = "border-color:var(--danger);color:var(--danger);background:var(--danger-soft)";
      else if(btnType === "green") cfYes.style.cssText = "background:var(--green);border-color:var(--green);color:#fff";
      else cfYes.style.cssText = "";
    }
    window._confirmCallback = callback;
    if(cfOv){ document.body.appendChild(cfOv); cfOv.classList.add("open"); }
    if(cfMod){ document.body.appendChild(cfMod); cfMod.classList.add("open"); }
  }
  function closeConfirm(){
    var cfOv = document.getElementById("cfOv");
    var cfMod = document.getElementById("cfMod");
    if(cfOv) cfOv.classList.remove("open");
    if(cfMod) cfMod.classList.remove("open");
    window._confirmCallback = null;
  }

  function openModal(){
    var ov = document.getElementById("tmOv");
    var mod = document.getElementById("tmMod");
    if(ov){ document.body.appendChild(ov); ov.classList.add("open"); }
    if(mod){ document.body.appendChild(mod); mod.classList.add("open"); }
  }
  function closeModal(){
    var ov = document.getElementById("tmOv");
    var mod = document.getElementById("tmMod");
    if(ov) ov.classList.remove("open");
    if(mod) mod.classList.remove("open");
  }

  function openManage(t){
    var title = document.getElementById("tmTitle");
    var body = document.getElementById("tmBody");
    if(!title || !body) return;
    title.textContent = t.n;

    var healthColor = t.health >= 80 ? "var(--green)" : t.health >= 60 ? "var(--amber)" : "var(--danger)";
    var isSuspended = t.st === "suspended";
    var isTrial = t.st === "trial";
    var isOffboarding = t.st === "offboarding";
    var offboardUrl = "tenant-offboard.html?tenant=" + encodeURIComponent(t.slug) + "&name=" + encodeURIComponent(t.n);

    body.innerHTML =
      // Offboarding banner (only when offboarding)
      (isOffboarding ?
        '<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--danger-soft);border:1px solid rgba(225,29,72,.2);border-radius:12px;margin-bottom:14px">' +
          '<span style="font-size:20px;flex:none">&#9888;</span>' +
          '<div style="flex:1;font-size:13.5px;line-height:1.5"><b style="color:var(--danger)">Offboarding in progress</b><br>Grace period active — data will be destroyed after it ends. Tenant admin has been notified.</div>' +
          '<a class="btn" href="' + offboardUrl + '" style="flex:none;border-color:var(--danger);color:var(--danger)">View offboarding workflow &rarr;</a>' +
        '</div>' : '') +

      // Status bar
      '<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;margin-bottom:18px">' +
        '<span class="badge ' + t.stBadge + ' dot" style="font-size:12px">' + t.stLabel + '</span>' +
        '<span style="font-size:13px;color:var(--muted)">' + t.slug + '</span>' +
        '<span style="margin-left:auto;font-size:13px">Health <b style="color:' + healthColor + '">' + t.health + '/100</b></span>' +
      '</div>' +

      // Two column detail
      '<div class="tm-grid">' +
        '<div>' +
          '<div class="tm-section">Tenant Details</div>' +
          '<div class="tm-item"><span class="k">Organization</span><span class="v">' + t.n + '</span></div>' +
          '<div class="tm-item"><span class="k">Slug</span><span class="v" style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px">' + t.slug + '</span></div>' +
          '<div class="tm-item"><span class="k">Plan</span><span class="v"><span class="badge ' + t.planCls + '">' + t.plan + '</span></span></div>' +
          '<div class="tm-item"><span class="k">Region</span><span class="v">' + t.region + '</span></div>' +
          '<div class="tm-item"><span class="k">Created</span><span class="v">' + t.created + '</span></div>' +
          '<div class="tm-item"><span class="k">Contract / Renewal</span><span class="v">' + t.contract + '</span></div>' +
        '</div>' +
        '<div>' +
          '<div class="tm-section">Configuration</div>' +
          '<div class="tm-item"><span class="k">Primary admin</span><span class="v">' + t.admin + '</span></div>' +
          '<div class="tm-item"><span class="k">Admin email</span><span class="v">' + t.email + '</span></div>' +
          '<div class="tm-item"><span class="k">SSO provider</span><span class="v">' + t.sso + '</span></div>' +
          '<div class="tm-item"><span class="k">KMS / BYOK</span><span class="v">' + t.kms + '</span></div>' +
          '<div class="tm-item"><span class="k">Retention</span><span class="v">' + t.retention + '</span></div>' +
          '<div class="tm-item"><span class="k">Compliance</span><span class="v" style="font-size:11.5px">' + t.compliance + '</span></div>' +
        '</div>' +
      '</div>' +

      // Usage summary
      '<div class="tm-section">Usage</div>' +
      '<div class="tm-grid">' +
        '<div class="tm-item"><span class="k">Databases</span><span class="v">' + t.dbs + '</span></div>' +
        '<div class="tm-item"><span class="k">Events/day</span><span class="v">' + t.events + '</span></div>' +
        '<div class="tm-item"><span class="k">Agents</span><span class="v">' + t.agents + '</span></div>' +
        '<div class="tm-item"><span class="k">Health score</span><span class="v" style="color:' + healthColor + '">' + t.health + '/100</span></div>' +
      '</div>' +

      // Quick links
      '<div class="tm-section">Quick Links</div>' +
      '<div class="tm-links">' +
        '<a class="tm-link" href="tenant-health.html"><span class="tli" style="background:var(--green-soft);color:var(--green)">&#9673;</span> Tenant Health</a>' +
        '<a class="tm-link" href="feature-flags.html"><span class="tli" style="background:var(--primary-soft);color:var(--primary)">&#9873;</span> Feature Flags</a>' +
        '<a class="tm-link" href="tenant-quotas.html"><span class="tli" style="background:var(--amber-soft);color:var(--amber)">&#9643;</span> Resource Quotas</a>' +
        '<a class="tm-link" href="tenant-impersonation.html"><span class="tli" style="background:var(--info-soft);color:var(--info)">&#9681;</span> Impersonate</a>' +
        '<a class="tm-link" href="billing.html"><span class="tli" style="background:var(--amber-soft);color:var(--amber)">&#9672;</span> Billing &amp; Usage</a>' +
        '<a class="tm-link" href="platform-audit.html"><span class="tli" style="background:var(--subtle);color:var(--surface)">&#9939;</span> Audit Log</a>' +
      '</div>' +

      // Lifecycle actions — change based on state
      '<div class="tm-actions">' +
        '<button class="btn tm-act" data-act="reset-pw" data-tenant="' + t.slug + '" data-admin="' + t.admin + '">&#128274; Reset admin password</button>' +
        '<button class="btn tm-act" data-act="force-logout" data-tenant="' + t.slug + '">&#9211; Force logout all users</button>' +
        '<button class="btn tm-act" data-act="export" data-tenant="' + t.slug + '">&#11123; Export tenant data</button>' +
        (isTrial
          ? '<button class="btn primary tm-act" data-act="extend-trial" data-tenant="' + t.slug + '">&#8635; Extend trial</button>'
          : '') +
        (isOffboarding
          ? '<a class="btn primary" href="' + offboardUrl + '">&#9655; View offboarding workflow</a>' +
            '<button class="btn tm-act" style="border-color:var(--green);color:var(--green)" data-act="cancel-offboard" data-tenant="' + t.slug + '">&#10003; Cancel offboarding</button>'
          : (isSuspended
              ? '<button class="btn primary tm-act" data-act="unsuspend" data-tenant="' + t.slug + '">&#10003; Unsuspend</button>'
              : '<button class="btn tm-act" style="border-color:var(--amber);color:var(--amber)" data-act="suspend" data-tenant="' + t.slug + '">&#9888; Suspend</button>') +
            '<button class="btn tm-act" style="border-color:var(--danger);color:var(--danger)" data-act="offboard" data-tenant="' + t.slug + '">&#9940; Offboard</button>') +
        (isOffboarding ? '' : '<button class="btn tm-act" data-act="migrate" data-tenant="' + t.slug + '">&#8644; Migrate</button>') +
      '</div>';

    openModal();
  }
}
</script>
</body></html>
