<!DOCTYPE html>
<html lang="en"><head><!--data-theme-boot--><script>(function(){try{var t=localStorage.getItem("nx-theme")||"dark";if(t==="system")t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TooVix Admin — Tenant Health</title>
<link rel="stylesheet" href="assets/app.css">
</head>
<body data-active="tenants">

  <div class="phead">
    <div>
      <h1>Tenant Health</h1>
      <div class="meta"><span>single-pane support view &middot; per-tenant diagnostics</span></div>
    </div>
  </div>

  <div style="margin-bottom:14px;display:flex;align-items:center;gap:12px">
    <label style="font-size:13px;font-weight:600;color:var(--muted)">Select tenant</label>
    <select id="tenantSel" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:13px;min-width:240px">
      <option value="meridian" selected>Meridian Financial</option>
      <option value="bnb">Bharat National Bank</option>
      <option value="nordic">Nordic Insurance Group</option>
      <option value="pacific">Pacific Health Partners</option>
      <option value="royal">Royal Commerce UK</option>
      <option value="govdata">GovData India</option>
      <option value="techstart">TechStart Inc</option>
    </select>
  </div>

  <div class="grid c4" style="margin-bottom:14px">
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--green-soft);color:var(--green)">&#9679;</span> Overall health</div><div class="kv" id="kvHealth" style="color:var(--green)">92</div><div class="kd up">composite score 0-100</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--primary-soft);color:var(--primary)">&#9646;</span> Databases</div><div class="kv" id="kvDbs">186</div><div class="kd">monitored</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--info-soft);color:var(--info)">&#8776;</span> Events/day</div><div class="kv" id="kvEvents">142.6M</div><div class="kd up">steady</div></div>
    <div class="kpi"><div class="kl"><span class="ki" style="background:var(--amber-soft);color:var(--amber)">&#9888;</span> Open issues</div><div class="kv" id="kvIssues">2</div><div class="kd down">1 high &middot; 1 medium</div></div>
  </div>

  <div id="healthContent"></div>

<script src="assets/ui.js"></script>
<script src="assets/admin-shell.js"></script>
<script>
(function init(){
  if(!document.querySelector(".app")){ setTimeout(init, 50); return; }
  setTimeout(doTenantHealth, 100);
})();
function doTenantHealth(){
  var c = document.getElementById("healthContent");
  if(!c) return;

        "<div class=\"bd\">" +
          "<div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span class=\"muted\">Events/s</span><b>1,651</b></div>" +
          "<div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span class=\"muted\">Ingest lag</span><b>0.8s</b></div>" +

          "<div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span class=\"muted\">Online / Total</span><b>339 / 341</b></div>" +
          "<div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span class=\"muted\">Offline agents</span><b style=\"color:var(--amber)\">agent-us-214, agent-us-307</b></div>" +

        "<div class=\"hd\"><span class=\"t\">Alert Health</span><span class=\"s\" style=\"color:var(--green)\">&#9679; Healthy</span></div>" +
        "<div class=\"bd\">" +

          "</tbody>" +
        "</table>" +
      "</div>" +
    "</div>";

  var sel = document.getElementById("tenantSel");
  if(sel){
    sel.onchange = function(){
      if(window.pf) pf.toast("Switched to " + sel.options[sel.selectedIndex].text, "ok");
    };
  }
}
</script>
</body></html>
